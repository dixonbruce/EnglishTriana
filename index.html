    :root {
      --bg: #f7f3ec;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #5d6673;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --border: #e2ddd3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 12px 0 28px;
    }

    .brand {
      font-weight: 750;
      letter-spacing: -0.02em;
      font-size: 1.1rem;
    }

    .language-toggle {
      display: flex;
      gap: 6px;
      background: rgba(255,255,255,0.7);
      padding: 4px;
      border: 1px solid var(--border);
      border-radius: 999px;
    }

    .language-toggle button {
      border: 0;
      background: transparent;
      padding: 7px 12px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 650;
      color: var(--muted);
    }

    .language-toggle button.active {
      background: var(--accent);
      color: white;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 28px;
      align-items: center;
      padding: 34px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: 0 18px 50px rgba(31,41,51,0.08);
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2.2rem, 6vw, 4.2rem);
      line-height: 0.98;
      letter-spacing: -0.055em;
    }

    .lead {
      font-size: 1.2rem;
      color: var(--muted);
      margin: 0 0 22px;
      max-width: 650px;
    }

    .trust-line {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0 24px;
    }

    .pill {
      background: #eef8f6;
      color: var(--accent-dark);
      border: 1px solid #cce9e5;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.92rem;
      font-weight: 650;
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .button {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 48px;
      padding: 13px 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 750;
      transition: 0.18s ease;
    }

    .button.primary {
      background: var(--accent);
      color: white;
    }

    .button.primary:hover { background: var(--accent-dark); }

    .button.secondary {
      color: var(--accent-dark);
      border: 1px solid #b8ded8;
      background: #f1fbf9;
    }

    .hero-card {
      background: #f9faf9;
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 22px;
    }

    .hero-card h2 {
      margin-top: 0;
      font-size: 1.2rem;
    }

    .hero-card ul {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
    }

    .sections {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 18px;
    }
